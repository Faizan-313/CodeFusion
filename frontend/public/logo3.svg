<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fb7185" />
      <stop offset="45%"  stop-color="#ec4899" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fda4af" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.10" />
    </linearGradient>

    <linearGradient id="shieldBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#831843" />
      <stop offset="100%" stop-color="#581c87" />
    </linearGradient>

    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34d399" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <linearGradient id="iconCamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fda4af" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="iconLockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e879f9" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <linearGradient id="laptopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c026d3" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fb7185" stop-opacity="0.28" />
      <stop offset="55%"  stop-color="#ec4899" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <mask id="padlockMask">
      <rect x="0" y="0" width="800" height="800" fill="white" />
      <circle cx="690" cy="405" r="7" fill="black" />
      <path d="M 685,405 L 695,405 L 693,423 L 687,423 Z" fill="black" />
    </mask>

    <mask id="laptopMask">
      <rect x="0" y="0" width="800" height="800" fill="white" />
      <text x="400" y="635" fill="black" font-family="Consolas, monospace" font-size="44" font-weight="bold" text-anchor="middle">&lt;/&gt;</text>
    </mask>
  </defs>

  <!-- Warm sunset ambient glow -->
  <circle cx="400" cy="430" r="260" fill="url(#glowGrad)" />

  <!-- Shield outline top -->
  <path d="M 180,380 L 180,210 L 400,130 L 620,210 L 620,290"
        fill="none" stroke="url(#shieldGrad)" stroke-width="28"
        stroke-linejoin="round" stroke-linecap="round"
        filter="url(#glow)" />

  <!-- Shield outline bottom -->
  <path d="M 145,480 C 160,660 380,720 400,730 C 420,720 640,660 655,480"
        fill="none" stroke="url(#shieldGrad)" stroke-width="28"
        stroke-linecap="round" filter="url(#glow)" />

  <!-- Shield translucent overlay for depth -->
  <path d="M 400,190 L 600,550 L 490,550 L 440,440 L 360,440 L 310,550 L 200,550 Z M 400,270 L 340,400 L 460,400 Z"
        fill="url(#shieldFill)" fill-rule="evenodd" />

  <!-- Shield deep silhouette -->
  <path d="M 400,190 L 600,550 L 490,550 L 440,440 L 360,440 L 310,550 L 200,550 Z M 400,270 L 340,400 L 460,400 Z"
        fill="url(#shieldBody)" fill-opacity="0.75" fill-rule="evenodd" />

  <!-- Checkmark -->
  <path d="M 310,440 L 420,540 L 670,270 L 620,230 L 420,440 L 360,390 Z"
        fill="url(#checkGrad)" filter="url(#glow)" />

  <!-- Webcam (AI proctoring) -->
  <g id="webcam">
    <path d="M 80,330 L 50,330 L 50,360" fill="none" stroke="#fb7185" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 80,480 L 50,480 L 50,450" fill="none" stroke="#fb7185" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="110" cy="385" r="24" fill="none" stroke="url(#iconCamGrad)" stroke-width="12" />
    <circle cx="110" cy="385" r="9" fill="url(#iconCamGrad)" />
    <rect x="102" y="415" width="16" height="15" fill="url(#iconCamGrad)" />
    <rect x="75" y="430" width="70" height="12" rx="6" fill="url(#iconCamGrad)" />
  </g>

  <!-- Padlock (security / lockdown) -->
  <g id="padlock">
    <path d="M 720,330 L 750,330 L 750,360" fill="none" stroke="#f472b6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 720,480 L 750,480 L 750,450" fill="none" stroke="#f472b6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 670,380 L 670,355 A 20,20 0 0 1 710,355 L 710,380" fill="none" stroke="url(#iconLockGrad)" stroke-width="10" />
    <rect x="652" y="380" width="76" height="60" rx="10" fill="url(#iconLockGrad)" mask="url(#padlockMask)" />
  </g>

  <!-- Developer / student -->
  <g id="developer">
    <circle cx="400" cy="490" r="30" fill="#7c2d92" fill-opacity="0.9" />
    <path d="M 330,570 C 330,515 470,515 470,570 Z" fill="#7c2d92" fill-opacity="0.9" />
    <polygon points="265,570 535,570 510,665 290,665" fill="url(#laptopGrad)" mask="url(#laptopMask)" />
    <rect x="275" y="670" width="250" height="16" rx="8" fill="#7c2d92" fill-opacity="0.75" />
  </g>
</svg>
